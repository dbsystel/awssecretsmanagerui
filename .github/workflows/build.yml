name: build
on:
  push:
    branches:
    - main
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2
    - name: Setup Go
      uses: actions/setup-go@bfdd3570ce990073878bf10f6b2d79082de49492 # v2
      with:
        go-version: '1.23'
    - name: Install dependencies
      run: |
        go version
        cd server; go mod tidy
    - name: Run build
      run: |
        cd server
        go build . 
    - name: Run testing
      run: |
        cd server
        go test -v
