name: build
on:
  push:
    branches:
    - '**'
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version: '1.25'
    - name: Install dependencies
      run: |
        go version
        cd server; go mod tidy
    - name: Run build
      run: |
        cd server
        go build . 
    - name: Run testing
      run: |
        cd server
        go test -v
